<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles_Version3.css">
    <title>🎨 Word Art Image Fill</title>
</head>
<body>
    <div class="container">
        <h1>🎨 Word Art Image Fill</h1>
        <p class="subtitle">Create stunning text art with image fills</p>
        
        <div class="input-section">
            <div class="form-group">
                <label for="wordInput">Word:</label>
                <input type="text" id="wordInput" placeholder="Enter your word (max 30 characters)" maxlength="30">
            </div>
            
            <div class="form-group">
                <label for="fontSelect">Font:</label>
                <select id="fontSelect">
                    <option value="Arial, sans-serif">Arial</option>
                    <option value="Georgia, serif">Georgia</option>
                    <option value="'Courier New', monospace">Courier New</option>
                    <option value="'Times New Roman', serif">Times New Roman</option>
                    <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
                    <option value="Verdana, sans-serif">Verdana</option>
                    <option value="'Impact', fantasy">Impact</option>
                    <option value="'Comic Sans MS', cursive">Comic Sans MS</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="fontSizeInput">Font Size (px):</label>
                <input type="range" id="fontSizeInput" min="50" max="300" value="150" class="slider">
                <span id="fontSizeValue">150</span>px
            </div>
            
            <div class="form-group">
                <label for="fillMode">Fill Mode:</label>
                <select id="fillMode">
                    <option value="word">Per-Word Fill</option>
                    <option value="letter">Per-Letter Fill</option>
                </select>
            </div>
        </div>
        
        <div class="image-section">
            <h2>Image Management</h2>
            
            <div class="form-group">
                <label for="imageUpload">Upload Images:</label>
                <input type="file" id="imageUpload" multiple accept="image/*">
                <p class="help-text">You can upload multiple images</p>
            </div>
            
            <div id="imageList" class="image-list"></div>
            
            <div class="image-controls">
                <p>Image: <span id="imageCounter">No images</span></p>
                <button id="prevImageBtn" class="nav-btn" disabled>← Previous</button>
                <button id="nextImageBtn" class="nav-btn" disabled>Next →</button>
            </div>
        </div>
        
        <div class="offset-section">
            <h2>Image Position</h2>
            
            <div class="form-group">
                <label for="offsetX">Offset X:</label>
                <input type="range" id="offsetX" min="-200" max="200" value="0" class="slider">
                <span id="offsetXValue">0</span>px
            </div>
            
            <div class="form-group">
                <label for="offsetY">Offset Y:</label>
                <input type="range" id="offsetY" min="-200" max="200" value="0" class="slider">
                <span id="offsetYValue">0</span>px
            </div>
        </div>
        
        <div id="canvas" class="preview-container">
            <h2>Preview</h2>
            <div class="preview">
                <p id="textDisplay">Your Word</p>
            </div>
        </div>
        
        <div class="button-group">
            <button id="saveBtn" class="btn btn-primary">💾 Save as PNG</button>
            <button id="resetBtn" class="btn btn-secondary">🔄 Reset</button>
        </div>
    </div>
    
    <canvas id="exportCanvas" style="display:none;"></canvas>
    
    <script src="script_Version3.js"></script>
</body>
</html>
