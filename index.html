<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordart Image Fill</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #canvas { border: 1px solid #000; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Wordart Image Fill</h1>
    <div>
        <label for="text-input">Enter Text:</label>
        <input type="text" id="text-input" placeholder="Type some text..."><br>
        <label for="upload-input">Upload Image:</label>
        <input type="file" id="upload-input" accept="image/*"><br>
        <button id="preview-button">Preview</button>
    </div>
    <canvas id="canvas" width="800" height="400"></canvas>
    <script>
        const textInput = document.getElementById('text-input');
        const uploadInput = document.getElementById('upload-input');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let image;

        document.getElementById('preview-button').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 72px Arial';
            ctx.textBaseline = 'top';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 5;
            ctx.strokeText(textInput.value, 50, 50);
            ctx.fillStyle = ctx.createPattern(image, 'no-repeat');
            ctx.fillText(textInput.value, 50, 50);
        });

        uploadInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        image = img;
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
